<div>
  <div class="page-header">
    <div>
      <h2 nz-typography nzTitle>User Management</h2>
      <span nz-typography nzType="secondary">Manage system users, roles, and permissions</span>
    </div>
    <nz-space>
      <button nz-button (click)="goRoles()">
        <span nz-icon nzType="team"></span>
        Manage Roles
      </button>
      <button nz-button (click)="goAuthorities()">
        <span nz-icon nzType="lock"></span>
        Manage Authorities
      </button>
      <button nz-button nzType="primary" (click)="createUser()">
        <span nz-icon nzType="plus"></span>
        Add New User
      </button>
    </nz-space>
  </div>
  <nz-row nzGutter="20" class="stats">
    <nz-col nzSpan="8">
      <nz-card>
        <ng-template #totalPrefix><span nz-icon nzType="user"></span></ng-template>
        <nz-statistic
          nzTitle="Total Users"
          [nzValue]="stats.total"
          [nzPrefix]="totalPrefix"
        ></nz-statistic>
      </nz-card>
    </nz-col>
    <nz-col nzSpan="8">
      <nz-card>
        <nz-statistic
          nzTitle="Active Users"
          [nzValue]="stats.active"
          [nzValueStyle]="{ color: '#52c41a' }"
        ></nz-statistic>
      </nz-card>
    </nz-col>
    <nz-col nzSpan="8">
      <nz-card>
        <nz-statistic
          nzTitle="Inactive Users"
          [nzValue]="stats.inactive"
          [nzValueStyle]="{ color: '#8c8c8c' }"
        ></nz-statistic>
      </nz-card>
    </nz-col>
  </nz-row>

  <nz-card class="filters">
    <nz-space nzSize="middle">
      <nz-input-wrapper nzPrefixIcon="search">
        <input
          nz-input
          placeholder="Search users..."
          [(ngModel)]="searchText"
          style="width: 300px"
        />
      </nz-input-wrapper>
      <nz-select [(ngModel)]="roleFilter" style="width: 200px">
        <nz-option nzValue="all" nzLabel="All Roles"></nz-option>
        <nz-option nzValue="System Administrator" nzLabel="System Administrator"></nz-option>
        <nz-option nzValue="Health Professional" nzLabel="Health Professional"></nz-option>
        <nz-option nzValue="Data Analyst" nzLabel="Data Analyst"></nz-option>
        <nz-option nzValue="Receptionist" nzLabel="Receptionist"></nz-option>
      </nz-select>
      <nz-select [(ngModel)]="statusFilter" style="width: 150px">
        <nz-option nzValue="all" nzLabel="All Statuses"></nz-option>
        <nz-option nzValue="active" nzLabel="Active"></nz-option>
        <nz-option nzValue="inactive" nzLabel="Inactive"></nz-option>
        <nz-option nzValue="suspended" nzLabel="Suspended"></nz-option>
      </nz-select>
    </nz-space>
  </nz-card>

  <nz-card>
    <nz-table [nzData]="filteredUsers" [nzPageSize]="10" [nzShowSizeChanger]="true" [nzLoading]="loadingUsers()">
      <thead>
        <tr>
          <th>User</th>
          <th>Username</th>
          <th>Contact</th>
          <th>Last Login</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        @for(user of filteredUsers; track user.uuid;){
          <tr>
            <td>
              <div class="user-cell">
                <nz-avatar [nzSize]="40" nzIcon="user" class="avatar"></nz-avatar>
                <div>
                  <div>
                    <strong>{{ user.firstName }} {{ user.surname }}</strong>
                  </div>
                </div>
              </div>
            </td>
            <td>
              <div>{{ user.username }}</div>
            </td>
            <td>
              <div>{{ user.email }}</div>
              <div class="muted">{{ user.phoneNumber }}</div>
            </td>
            <td>{{ user.lastLogin }}</td>
            <td>
              <nz-badge
                [nzStatus]="
                  !user.disabled
                    ? 'success'
                    : 'error'
                "
                [nzText]="user.disabled ? 'Inactive' : 'Active'"
              ></nz-badge>
            </td>
            <td>
              <button nz-button nzType="link" (click)="editUser(user.uuid)">
                <span nz-icon nzType="edit"></span>
                Edit
              </button>
            </td>
          </tr>
        }
      </tbody>
    </nz-table>
  </nz-card>
</div>
