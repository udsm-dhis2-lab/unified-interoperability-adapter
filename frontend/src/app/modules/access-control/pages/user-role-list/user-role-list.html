<div>
  <div class="page-header">
    <div>
      <h2 nz-typography nzTitle>User Roles</h2>
      <span nz-typography nzType="secondary">Manage user roles and their associated permissions</span>
    </div>
    <nz-space>
      <button nz-button (click)="goAuthorities()">
        <span nz-icon nzType="safety"></span>
        Manage Authorities
      </button>
      <button nz-button nzType="primary" (click)="createRole()">
        <span nz-icon nzType="plus"></span>
        Create New Role
      </button>
    </nz-space>
  </div>

  <nz-row nzGutter="16" class="stats">
    <nz-col nzSpan="6">
      <nz-card>
        <ng-template #rolePrefix><span nz-icon nzType="team"></span></ng-template>
        <nz-statistic nzTitle="Total Roles" [nzValue]="roles.length" [nzPrefix]="rolePrefix"></nz-statistic>
      </nz-card>
    </nz-col>
  </nz-row>

  <nz-card class="filters">
    <nz-space nzSize="middle">
      <nz-input-wrapper nzPrefixIcon="search">
        <input nz-input placeholder="Search users..." (input)="onSearchRole($event)" style="width: 300px" />
      </nz-input-wrapper>
    </nz-space>
    <!-- <nz-space nzSize="middle">
      <nz-input-group nzPrefixIcon="search">
        <input nz-input placeholder="Search roles..." [(ngModel)]="searchText" style="width: 300px" />
      </nz-input-group>
      <button nz-button [nzType]="statusFilter === 'all' ? 'default' : 'primary'" (click)="statusFilter = 'all'">All</button>
      <button nz-button [nzType]="statusFilter === 'active' ? 'primary' : 'default'" (click)="statusFilter = 'active'">Active</button>
      <button nz-button [nzType]="statusFilter === 'inactive' ? 'primary' : 'default'" (click)="statusFilter = 'inactive'">Inactive</button>
    </nz-space> -->
  </nz-card>

  <nz-card>
    <nz-table [nzData]="roles" [nzTotal]="total()" [nzPageSize]="pageSize()" [nzPageIndex]="pageIndex()"
  (nzQueryParams)="onQueryParamsChange($event)" [nzShowSizeChanger]="true" [nzLoading]="loadingRoles()">
      <thead>
        <tr>
          <th>Role Name</th>
          <th>Description</th>
          <th>Privileges</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        @for(role of roles; track role.uuid){
          <tr>
            <td>
              <div><strong class="role">{{ role.roleName }}</strong></div>
            </td>
            <td>{{ role.description }}</td>
            <td><nz-tag nzColor="blue">{{ role.privileges.length }} permissions</nz-tag></td>
            <td>
              <nz-space>
                <button *nzSpaceItem nz-button nzType="link" (click)="editRole(role.uuid)">
                  <span nz-icon nzType="edit"></span>
                  Edit
                </button>
            
                <button *nzSpaceItem nz-button nzType="link" nzDanger (click)="deleteRole(role)">
                  <span nz-icon nzType="delete"></span>
                  Delete
                </button>
              </nz-space>
            </td>
          </tr>
        }
      </tbody>
    </nz-table>
  </nz-card>
</div>
